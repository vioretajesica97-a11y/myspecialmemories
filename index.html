    <style amp-custom>
        * {
            box-sizing: border-box
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background:
                linear-gradient(180deg,
                    rgba(30, 0, 0, .4),
                    rgba(10, 0, 0, .9)),

                url("https://ug300.org/asetgoogle/ug300id.webp") center/cover no-repeat fixed;

            min-height: 100vh;

        .imlek-glow {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 320px;
            height: 320px;
            transform: translate(-50%, -50%);

            filter: blur(90px);
            z-index: -1;
            animation: pulse 6s ease-in-out infinite;
        }

        @keyframes pulse {

            }

            }
        }

        .logo-container {

        h1 {

        .sub-heading {

            letter-spacing: 4px;
            color: #ffd966;
            border-bottom: 1px solid rgba(255, 215, 102, .4);
            padding-bottom: 8px;
            text-align: center;
        }

        .sub-heading-2 {
            margin: 0 30px;
            font-size: 12px;
            letter-spacing: 4px;
            color: #ffd966;
            padding-bottom: 0px;
            text-align: center;

        .banner-card {

        .banner-card amp-img {

        .btn-stack {

        }

        .btn-card {

            border: 1px solid rgba(255, 215, 102, .25);
            border-radius: 14px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: .3s;
        }

        .btn-card:hover {
            transform: translateY(-3px);
            border-color: #ffd966;
            box-shadow: 0 0 25px rgba(255, 215, 102, .3);
        }

        .btn-label {

            align-items: center;
            gap: 14px;
            padding-left: 14px;
        }

            height: 34px;

            align-items: center;
            justify-content: center;
        }

        .btn-title {
            font-family: 'Cinzel', serif;

            color: #ffd966;

        }

        }

            border-radius: 8px;
            font-size: 12px;

            text-decoration: none;

            letter-spacing: 1.2px;
        }

        .btn-outline {
            background: linear-gradient(135deg, #bb00ff, #66006d);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 215, 102, .6);
        }

        .btn-solid {
            background: linear-gradient(135deg, #bb00ff, #66006d);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 215, 102, .6);
        }

        .btn-link {
            border: 1px solid #555;

        }

        .copyright {
            margin-top: 40px;
            font-size: 10px;
            letter-spacing: 2px;
            color: #ffffff;
            text-transform: uppercase;
        }

        .glass-effect {
            position: relative;
            overflow: hidden;
        }

        .glass-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 120%;
            height: 100%;
            background:
                linear-gradient(120deg,
                    transparent 0%,
                    rgba(255, 215, 0, 0.3) 40%,
                    rgba(255, 215, 0, 0.3) 50%,
                    rgba(255, 215, 0, 0.3) 60%,
                    transparent 100%);
            transform: skewX(-15deg);
            animation: glassShine 4.5s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes glassShine {
            0% {
                left: -150%;
            }

            50% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        .sakura-fall {
            position: fixed;
            top: -15%;
            left: -10%;
            width: 120%;
            height: 120%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .sakura-fall::before,
        .sakura-fall::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 10% 0%, rgba(255, 190, 200, .9) 0 5px, transparent 6px),
                radial-gradient(circle at 35% 15%, rgba(255, 210, 220, .85) 0 6px, transparent 7px),
                radial-gradient(circle at 60% 5%, rgba(255, 175, 190, .9) 0 5px, transparent 6px),
                radial-gradient(circle at 85% 20%, rgba(255, 200, 210, .8) 0 6px, transparent 7px);
            background-size: 320px 320px;
            animation: sakuraFall 22s linear infinite;
            opacity: .75;
        }

        .sakura-fall::after {
            background-size: 420px 420px;
            animation: sakuraFallSlow 32s linear infinite;
            opacity: .45;
        }

        @keyframes sakuraFall {
            0% {
                transform: translateY(-20%) translateX(0);
            }

            100% {
                transform: translateY(120%) translateX(18%);
            }
        }

        @keyframes sakuraFallSlow {
            0% {
                transform: translateY(-25%) translateX(-5%);
            }

            100% {
                transform: translateY(120%) translateX(12%);
            }
        }

        .imlek-premium-frame {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .imlek-premium-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 8% 50%, rgba(255, 215, 150, .18) 0 120px, transparent 130px),
                radial-gradient(circle at 12% 60%, rgba(255, 200, 120, .14) 0 90px, transparent 100px),
                radial-gradient(circle at 92% 48%, rgba(255, 215, 150, .18) 0 120px, transparent 130px),
                radial-gradient(circle at 88% 62%, rgba(255, 200, 120, .14) 0 90px, transparent 100px);
            filter: blur(2px);
        }

        .imlek-premium-frame::after {
            content: "";
            position: absolute;
            inset: 0%;
            background:
                radial-gradient(circle, rgba(186, 102, 255, 0.8) 1px, transparent 2px),
                radial-gradient(circle, rgba(217, 160, 255, 0.6) 1px, transparent 2px);
            background-size: 160px 160px, 220px 220px;
            animation: goldFloat 28s linear infinite;
            opacity: .35;
        }

        @keyframes goldFloat {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-160px);
            }
        }
    </style>
